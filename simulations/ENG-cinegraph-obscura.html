<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinegraph Obscura — Interactive Cinema Network</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;500;600&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080c;--surface:#111118;--card:#18181f;--border:#252532;--gold:#e2b93b;--gold-glow:rgba(226,185,59,0.08);--orange:#f06830;--blue:#5b8def;--green:#3dc98a;--purple:#b06de8;--cyan:#4ecdc4;--text:#e5e3df;--text-sec:#9a98a8;--text-dim:#5e5c6e;--font-display:'Instrument Serif',serif;--font-body:'Source Sans 3',sans-serif;--font-mono:'Geist Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:var(--font-body);overflow:hidden;height:100vh}::selection{background:var(--gold);color:var(--bg)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#gc{position:absolute;top:0;left:0;width:100%;height:100%;cursor:grab}#gc:active{cursor:grabbing}

.hdr{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:linear-gradient(180deg,rgba(8,8,12,0.95)0%,rgba(8,8,12,0.7)80%,transparent 100%);pointer-events:none}
.hdr>*{pointer-events:auto}.hdr-l{display:flex;align-items:center;gap:12px}
.hdr-l h1{font-family:var(--font-display);font-size:1.4rem;font-weight:400}.hdr-l h1 em{color:var(--gold);font-style:italic}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--card);border:1px solid var(--border);border-radius:100px;font-family:var(--font-mono);font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em}
.badge .dot{width:5px;height:5px;background:var(--green);border-radius:50%;animation:p 2s infinite}@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.mtabs{display:flex;gap:4px}.mt{padding:6px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);cursor:pointer;transition:all .2s}
.mt:hover{border-color:var(--gold);color:var(--text-sec)}.mt.act{border-color:var(--gold);color:var(--gold);background:var(--gold-glow)}

.ctrl{position:fixed;top:64px;left:16px;z-index:100;width:250px;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 12px 48px rgba(0,0,0,.5)}
.ctrl-h{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.ctrl-h h3{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim)}
.ctrl-b{padding:12px 14px;display:flex;flex-direction:column;gap:11px;max-height:calc(100vh - 180px);overflow-y:auto}.ctrl-b.hid{display:none}
.cg label{display:block;font-family:var(--font-mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:5px}
.si{width:100%;padding:7px 10px;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font-body);font-size:12px;outline:none;transition:border-color .2s}
.si:focus{border-color:var(--gold)}.si::placeholder{color:var(--text-dim)}
.chips{display:flex;flex-wrap:wrap;gap:4px}.chip{padding:4px 8px;background:var(--card);border:1px solid var(--border);border-radius:5px;font-size:10px;font-weight:500;cursor:pointer;transition:all .2s;user-select:none;color:var(--text-sec)}
.chip:hover{border-color:#3a3a4e}.chip.act{border-color:var(--gold);color:var(--gold);background:var(--gold-glow)}
.chip.bc.act{border-color:var(--cyan);color:var(--cyan);background:rgba(78,205,196,.08)}
.chip[data-l="films"].act{border-color:#e85555;color:#e85555;background:rgba(232,85,85,.08)}
.chip[data-l="actors"].act{border-color:#f06830;color:#f06830;background:rgba(240,104,48,.08)}
.chip[data-l="studios"].act{border-color:#3dc98a;color:#3dc98a;background:rgba(61,201,138,.08)}
.sr{display:flex;align-items:center;gap:8px}.sr input[type=range]{flex:1;accent-color:var(--gold);height:3px}
.sr .sv{font-family:var(--font-mono);font-size:10px;color:var(--text-sec);min-width:28px;text-align:right}
.br{display:flex;gap:5px}.bn{flex:1;padding:6px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text-sec);font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;text-align:center;transition:all .2s}
.bn:hover{border-color:var(--gold);color:var(--gold)}.bn.act{background:var(--gold-glow);border-color:var(--gold);color:var(--gold)}

.dp{position:fixed;top:64px;right:16px;z-index:100;width:280px;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 12px 48px rgba(0,0,0,.5);display:none}
.dp.vis{display:block;animation:si .25s ease-out}@keyframes si{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
.dp-h{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-bottom:1px solid var(--border)}
.dp-h h2{font-family:var(--font-display);font-size:1.1rem;font-weight:400}.dp-h .dc{background:none;border:none;color:var(--text-dim);font-size:16px;cursor:pointer;padding:2px}.dp-h .dc:hover{color:var(--text)}
.dp-b{padding:13px 14px;max-height:calc(100vh - 180px);overflow-y:auto}
.ds{margin-bottom:13px}.ds h4{font-family:var(--font-mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:5px}
.dtg{display:inline-flex;padding:3px 7px;margin:2px;border-radius:4px;font-size:10px;font-weight:500}
.fr{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;font-size:11px;border-bottom:1px solid rgba(37,37,50,.4)}
.fr .ft{color:var(--text);flex:1}.fr .fy{color:var(--text-dim);font-family:var(--font-mono);font-size:10px;margin:0 6px}.fr .frt{color:var(--gold);font-family:var(--font-mono);font-size:10px;font-weight:600}
.il{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-sec);padding:2px 0}.ia{color:var(--gold);font-family:var(--font-mono)}
.strow{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:1px solid rgba(37,37,50,.3)}.strow .sk{color:var(--text-sec)}.strow .svl{font-family:var(--font-mono);font-weight:600}

.po{position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:110;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 18px;display:none;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.po.vis{display:flex;align-items:center;gap:8px;animation:si .2s}
.po-l{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);text-transform:uppercase}
.po-n{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:500}.po-a{color:var(--orange);font-family:var(--font-mono)}
.po-c{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;margin-left:8px}

.tbar{position:fixed;bottom:50px;left:16px;right:190px;z-index:90;background:rgba(17,17,24,.9);border:1px solid var(--border);border-radius:8px;padding:10px 16px;backdrop-filter:blur(8px);display:none}
.tbar.vis{display:block}
.tbar label{font-family:var(--font-mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim)}
.tl-r{display:flex;align-items:center;gap:10px;margin-top:5px}.tl-r input[type=range]{flex:1;accent-color:var(--gold)}
.tl-y{font-family:var(--font-mono);font-size:16px;color:var(--gold);font-weight:600;min-width:45px}
.tl-p{padding:5px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text-sec);font-family:var(--font-mono);font-size:10px;cursor:pointer}.tl-p:hover{border-color:var(--gold);color:var(--gold)}

.mm{position:fixed;bottom:16px;right:16px;z-index:90;width:160px;height:100px;background:rgba(17,17,24,.85);border:1px solid var(--border);border-radius:8px;overflow:hidden;backdrop-filter:blur(4px)}
.mm canvas{width:100%;height:100%}

.lgd{position:fixed;bottom:16px;left:16px;z-index:90;display:flex;flex-wrap:wrap;gap:10px;padding:10px 14px;background:rgba(17,17,24,.9);border:1px solid var(--border);border-radius:8px;backdrop-filter:blur(8px)}
.lgd-i{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text-sec)}.lgd-d{width:8px;height:8px;border-radius:50%}

.tt{position:fixed;z-index:200;padding:7px 12px;background:var(--card);border:1px solid var(--border);border-radius:7px;font-size:11px;color:var(--text);pointer-events:none;display:none;box-shadow:0 8px 32px rgba(0,0,0,.4);max-width:200px}
.tt .tn{font-weight:600;margin-bottom:1px}.tt .tm{font-size:10px;color:var(--text-sec)}
</style>
</head>

<canvas id="gc"></canvas>
<div class="hdr">
  <div class="hdr-l"><h1>Cinegraph <em>Obscura</em></h1><span class="badge"><span class="dot"></span>v2</span></div>
  <div class="mtabs">
    <div class="mt act" onclick="setMode('explore')">Explore</div>
    <div class="mt" onclick="setMode('cluster')">Cluster</div>
    <div class="mt" onclick="setMode('path')">Pathfinder</div>
    <div class="mt" onclick="setMode('timeline')">Timeline</div>
  </div>
</div>
<div class="ctrl">
  <div class="ctrl-h" onclick="document.getElementById('cb').classList.toggle('hid')"><h3>Controls</h3><span style="color:var(--text-dim);font-size:12px">▼</span></div>
  <div class="ctrl-b" id="cb">
    <div class="cg"><label>Search</label><input class="si" id="sI" type="text" placeholder="Kubrick, Nykvist..."></div>
    <div class="cg"><label>Layers</label><div class="chips">
      <div class="chip act" data-l="directors" onclick="tL(this)">Directors</div>
      <div class="chip act" data-l="influences" onclick="tL(this)">Influences</div>
      <div class="chip act" data-l="movements" onclick="tL(this)">Movements</div>
      <div class="chip bc" data-l="bridges" onclick="tL(this)">Bridges</div>
      <div class="chip" data-l="films" onclick="tL(this)" style="--ac:#e85555">Films</div>
      <div class="chip" data-l="actors" onclick="tL(this)" style="--ac:#f06830">Actors</div>
      <div class="chip" data-l="studios" onclick="tL(this)" style="--ac:#3dc98a">Studios</div>
      <div class="chip" data-l="external" onclick="tL(this)">External</div>
    </div></div>
    <div class="cg"><label>Physics</label><div class="sr"><input type="range" id="fS" min="0" max="100" value="45"><span class="sv" id="fV">45</span></div></div>
    <div class="cg"><label>Distance</label><div class="sr"><input type="range" id="dS" min="80" max="400" value="170"><span class="sv" id="dV">170</span></div></div>
    <div class="cg"><div class="br">
      <div class="bn" onclick="resetV()">Reset</div>
      <div class="bn" id="pB" onclick="tP()">Pause</div>
      <div class="bn" onclick="shufflePos()">Shuffle</div>
    </div></div>
  </div>
</div>
<div class="dp" id="dp"><div class="dp-h"><h2 id="dn"></h2><button class="dc" onclick="cD()">✕</button></div><div class="dp-b" id="db"></div></div>
<div class="po" id="po"><span class="po-l">Shortest path:</span><div class="po-n" id="pN"></div><button class="po-c" onclick="cP()">✕</button></div>
<div class="tbar" id="tB"><label>Timeline filter</label><div class="tl-r"><span class="tl-y" id="tY">2025</span><input type="range" id="tS" min="1925" max="2025" value="2025" step="1"><button class="tl-p" id="tPl" onclick="tTP()">▶ Play</button></div></div>
<div class="lgd" id="lgd"></div>
<div class="mm"><canvas id="mc" width="320" height="200"></canvas></div>
<div class="tt" id="tt"><div class="tn"></div><div class="tm"></div></div>

  const ms=new Set();MOV.forEach(([p,m])=>ms.add(m));
  ms.forEach(m=>{const nd={id:m,label:m,type:'movement',films:0,radius:5,color:C.movement,x:0,y:0,vx:0,vy:0,fx:null,fy:null,visible:true,cluster:m};nodes.push(nd);NM[m]=nd});

// ═══════════ PHYSICS ═══════════
let fMul=.45,lDist=170,paused=false;const DMP=.87;
function sim(){
  if(paused)return;const str=fMul*.6;
  for(let i=0;i<nodes.length;i++){if(!nodes[i].visible)continue;for(let j=i+1;j<nodes.length;j++){if(!nodes[j].visible)continue;let dx=nodes[j].x-nodes[i].x,dy=nodes[j].y-nodes[i].y,d=Math.sqrt(dx*dx+dy*dy)||1,f=(str*10000)/(d*d),fx=(dx/d)*f,fy=(dy/d)*f;nodes[i].vx-=fx;nodes[i].vy-=fy;nodes[j].vx+=fx;nodes[j].vy+=fy}}
  edges.forEach(e=>{if(!e.visible||!e.source.visible||!e.target.visible)return;let dx=e.target.x-e.source.x,dy=e.target.y-e.source.y,d=Math.sqrt(dx*dx+dy*dy)||1;const ld=e.type==='bridge'?lDist*.7:lDist;let f=(d-ld)*str*.007,fx=(dx/d)*f,fy=(dy/d)*f;e.source.vx+=fx;e.source.vy+=fy;e.target.vx-=fx;e.target.vy-=fy});
  if(mode==='cluster'){const cc={};nodes.forEach(n=>{if(n.visible&&n.cluster&&n.type==='director'){if(!cc[n.cluster])cc[n.cluster]={x:0,y:0,c:0};cc[n.cluster].x+=n.x;cc[n.cluster].y+=n.y;cc[n.cluster].c++}});
  Object.keys(cc).forEach(k=>{cc[k].x/=cc[k].c;cc[k].y/=cc[k].c});
  nodes.forEach(n=>{if(n.visible&&n.cluster&&cc[n.cluster]&&n.type==='director'){n.vx+=(cc[n.cluster].x-n.x)*.004*str;n.vy+=(cc[n.cluster].y-n.y)*.004*str}})}
  const cx=cv.width/(2*dpr),cy=cv.height/(2*dpr);
  nodes.forEach(n=>{if(!n.visible)return;if(n.fx!==null){n.x=n.fx;n.y=n.fy;n.vx=0;n.vy=0;return}n.vx+=(cx-n.x)*.0002*str;n.vy+=(cy-n.y)*.0002*str;n.vx*=DMP;n.vy*=DMP;n.x+=n.vx;n.y+=n.vy});
}

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);ctx.save();ctx.scale(dpr,dpr);ctx.translate(panX,panY);ctx.scale(zoom,zoom);
  edges.forEach(e=>{
    if(!e.visible||!e.source.visible||!e.target.visible)return;
    const iS=selected&&(e.source.id===selected.id||e.target.id===selected.id);
    const iP=pathHL.length&&pathHL.some(([a,b])=>(e.source.id===a&&e.target.id===b)||(e.source.id===b&&e.target.id===a));
    let col=e.type==='influence'?EC.influence:e.type==='bridge'?EC.bridge:e.type==='film'?EC.film:e.type==='actor'?EC.actor:e.type==='studio'?EC.studio:EC.movement;
    if(iP)col='rgba(226,185,59,0.9)';else if(iS)col=e.type==='influence'?'rgba(240,104,48,0.85)':e.type==='bridge'?'rgba(78,205,196,0.7)':'rgba(176,109,232,0.6)';
    ctx.beginPath();ctx.moveTo(e.source.x,e.source.y);ctx.lineTo(e.target.x,e.target.y);ctx.strokeStyle=col;ctx.lineWidth=iP?3:iS?1.8:.7;ctx.stroke();
    if(e.type==='influence'){const dx=e.target.x-e.source.x,dy=e.target.y-e.source.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist>0){const t=1-(e.target.radius+5)/dist,ax=e.source.x+dx*t,ay=e.source.y+dy*t,a=Math.atan2(dy,dx),l=iP?11:iS?9:6;ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ax-l*Math.cos(a-.35),ay-l*Math.sin(a-.35));ctx.lineTo(ax-l*Math.cos(a+.35),ay-l*Math.sin(a+.35));ctx.closePath();ctx.fillStyle=col;ctx.fill()}}
  });
  nodes.forEach(n=>{
    if(!n.visible)return;
    const iS=selected&&selected.id===n.id,iH=hovered&&hovered.id===n.id;
    const iC=selected&&edges.some(e=>e.visible&&((e.source.id===selected.id&&e.target.id===n.id)||(e.target.id===selected.id&&e.source.id===n.id)));
    const iOP=pathHL.length&&pathHL.some(([a,b])=>a===n.id||b===n.id);
    const dim=(selected&&!iS&&!iC&&!iOP)||(mode==='timeline'&&n.type==='director'&&n.y1>timeYear);
    if(iS||iH||iOP){ctx.beginPath();ctx.arc(n.x,n.y,n.radius+8,0,Math.PI*2);const g=ctx.createRadialGradient(n.x,n.y,n.radius,n.x,n.y,n.radius+12);g.addColorStop(0,n.color+'40');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fill()}
    ctx.beginPath();ctx.arc(n.x,n.y,n.radius,0,Math.PI*2);ctx.fillStyle=dim?n.color+'25':n.color;ctx.fill();
    if(iS){ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke()}
    if(iOP&&!iS){ctx.strokeStyle=C.director;ctx.lineWidth=1.5;ctx.stroke()}
    const fs=n.type==='director'?Math.max(8.5,n.radius*.8):n.type==='bridge'?8.5:7.5;
    ctx.font=`${n.type==='movement'?'500':'600'} ${fs}px 'Source Sans 3',sans-serif`;ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillStyle=dim?'rgba(229,227,223,0.1)':(iS||iH||iOP)?'#fff':'rgba(229,227,223,0.7)';
    ctx.fillText(n.label,n.x,n.y+n.radius+3);
  });
  ctx.restore();
  // Minimap
  mctx.clearRect(0,0,320,200);
  let mnX=1e9,mxX=-1e9,mnY=1e9,mxY=-1e9;
  nodes.forEach(n=>{if(n.visible){mnX=Math.min(mnX,n.x);mxX=Math.max(mxX,n.x);mnY=Math.min(mnY,n.y);mxY=Math.max(mxY,n.y)}});
  if(isFinite(mnX)){const p=40,sx=300/(mxX-mnX+p*2),sy=180/(mxY-mnY+p*2),s=Math.min(sx,sy);
  nodes.forEach(n=>{if(!n.visible)return;const x=10+(n.x-mnX+p)*s,y=10+(n.y-mnY+p)*s;mctx.beginPath();mctx.arc(x,y,Math.max(1.2,n.radius*s*.3),0,Math.PI*2);mctx.fillStyle=n.color+'70';mctx.fill()})}
}

// ═══════════ INTERACTION ═══════════
function gN(mx,my){const x=(mx-panX)/zoom,y=(my-panY)/zoom;let cl=null,md=1e9;nodes.forEach(n=>{if(!n.visible)return;const d=Math.sqrt((n.x-x)**2+(n.y-y)**2);if(d<n.radius+5&&d<md){cl=n;md=d}});return cl}

cv.addEventListener('mousedown',e=>{didDrag=false;const nd=gN(e.clientX,e.clientY);if(nd&&mode!=='path'){dragging=nd;nd.fx=nd.x;nd.fy=nd.y}else if(!nd){isPan=true;dragStart={x:e.clientX-panX,y:e.clientY-panY}}});
cv.addEventListener('mousemove',e=>{
  if(dragging){didDrag=true;dragging.fx=(e.clientX-panX)/zoom;dragging.fy=(e.clientY-panY)/zoom;dragging.x=dragging.fx;dragging.y=dragging.fy}
  else if(isPan&&dragStart){didDrag=true;panX=e.clientX-dragStart.x;panY=e.clientY-dragStart.y}
  else{const nd=gN(e.clientX,e.clientY);hovered=nd;cv.style.cursor=nd?(mode==='path'?'crosshair':'pointer'):'grab';
    const tt=document.getElementById('tt');
    if(nd){let m=nd.type==='director'?`${nd.films} film · ${nd.countries?nd.countries.join(', '):''}`:nd.type==='movement'?'Cinema Movement':nd.type==='bridge'?`Bridge · ${nd.role}`:nd.type==='external'?'External Influence':nd.type==='film'?`${nd.year} · ★ ${nd.rating?.toFixed(1)||'?'} · ${nd.dirName}`:nd.type==='actor'?`${nd.actCount} film · ${nd.dirName}`:nd.type==='studio'?`${nd.studioFilms} film`:'';
    tt.querySelector('.tn').textContent=nd.label;tt.querySelector('.tm').textContent=m;tt.style.display='block';tt.style.left=(e.clientX+14)+'px';tt.style.top=(e.clientY-8)+'px'}else tt.style.display='none'}
});
cv.addEventListener('mouseup',()=>{if(dragging){dragging.fx=null;dragging.fy=null}dragging=null;isPan=false;dragStart=null});
cv.addEventListener('click',e=>{
  if(didDrag)return;const nd=gN(e.clientX,e.clientY);
  if(mode==='path'&&nd&&nd.type==='director'){
    if(!pathSrc){pathSrc=nd;selected=nd;showDetail(nd)}
    else if(nd.id!==pathSrc.id){findPath(pathSrc.id,nd.id);pathSrc=null}
    return;
  }
  if(nd){selected=nd;showDetail(nd)}else{selected=null;cD()}
});
cv.addEventListener('wheel',e=>{e.preventDefault();const f=e.deltaY>0?.92:1.08;const nz=Math.max(.2,Math.min(5,zoom*f));panX=e.clientX-(e.clientX-panX)*(nz/zoom);panY=e.clientY-(e.clientY-panY)*(nz/zoom);zoom=nz},{passive:false});

// ═══════════ SHORTEST PATH (BFS) ═══════════
function findPath(src,tgt){
  const adj={};nodes.forEach(n=>{if(n.visible)adj[n.id]=[]});
  edges.forEach(e=>{if(e.visible&&e.source.visible&&e.target.visible){adj[e.source.id]?.push(e.target.id);adj[e.target.id]?.push(e.source.id)}});
  const q=[src],vis=new Set([src]),prev={};prev[src]=null;let found=false;
  while(q.length){const cur=q.shift();if(cur===tgt){found=true;break}
  for(const nb of (adj[cur]||[])){if(!vis.has(nb)){vis.add(nb);prev[nb]=cur;q.push(nb)}}}
  if(!found){pathHL=[];document.getElementById('po').classList.remove('vis');return}
  const path=[];let c=tgt;while(c!==null){path.unshift(c);c=prev[c]}
  pathHL=[];for(let i=0;i<path.length-1;i++)pathHL.push([path[i],path[i+1]]);
  const po=document.getElementById('po'),pn=document.getElementById('pN');
  pn.innerHTML=path.map((p,i)=>`<span style="color:${NM[p]?.color||'#fff'}">${p}</span>${i<path.length-1?'<span class="po-a"> → </span>':''}`).join('');
  po.classList.add('vis');selected=null;cD();
}
function cP(){pathHL=[];document.getElementById('po').classList.remove('vis')}

// ═══════════ DETAIL PANEL ═══════════
function showDetail(nd){
  const dp=document.getElementById('dp'),dn=document.getElementById('dn'),db=document.getElementById('db');
  dn.textContent=nd.label;let h='';
  if(nd.type==='director'){
    const deg=DEG[nd.id]||0;const ib=INF.filter(([f,t])=>f===nd.id).map(([f,t])=>t);const io=INF.filter(([f,t])=>t===nd.id).map(([f,t])=>f);
    h+=`<div class="ds"><h4>Statistics</h4>`;
    h+=`<div class="strow"><span class="sk">Films</span><span class="svl" style="color:var(--gold)">${nd.films}</span></div>`;
    h+=`<div class="strow"><span class="sk">Active period</span><span class="svl">${nd.y1}–${nd.y2}</span></div>`;
    h+=`<div class="strow"><span class="sk">Country</span><span class="svl">${(nd.countries||[]).join(', ')}</span></div>`;
    h+=`<div class="strow"><span class="sk">Degree</span><span class="svl">${deg.toLocaleString()}</span></div>`;
    h+=`<div class="strow"><span class="sk">Influenced by</span><span class="svl" style="color:var(--orange)">${ib.length}</span></div>`;
    h+=`<div class="strow"><span class="sk">Influenced</span><span class="svl" style="color:var(--green)">${io.length}</span></div></div>`;
    const filmList=FILMS[nd.id]||nd.top||[];
    if(filmList.length){h+=`<div class="ds"><h4>Top Films</h4>`;filmList.slice(0,8).forEach(f=>{h+=`<div class="fr"><span class="ft">${f.t}</span><span class="fy">${f.y}</span><span class="frt">★ ${f.r.toFixed(1)}</span></div>`});h+=`</div>`}
    if(ib.length){h+=`<div class="ds"><h4>Influenced by</h4>`;ib.forEach(t=>{h+=`<div class="il"><span class="ia">←</span> ${t}</div>`});h+=`</div>`}
    if(io.length){h+=`<div class="ds"><h4>Influenced</h4>`;io.forEach(f=>{h+=`<div class="il"><span class="ia">→</span> ${f}</div>`});h+=`</div>`}
    const mvs=MOV.filter(([p,m])=>p===nd.id).map(([p,m])=>m);
    if(mvs.length){h+=`<div class="ds"><h4>Movements</h4>`;mvs.forEach(m=>{h+=`<div class="dtg" style="background:rgba(176,109,232,.12);color:var(--purple);margin-bottom:3px">${m}</div> `});h+=`</div>`}
    const brs=BRG.filter(b=>b.dirs.includes(nd.id));
    if(brs.length){h+=`<div class="ds"><h4>Bridge Persons</h4>`;brs.forEach(b=>{const others=b.dirs.filter(d=>d!==nd.id).join(', ');h+=`<div style="font-size:11px;padding:3px 0;border-bottom:1px solid rgba(37,37,50,.3)"><span style="color:var(--cyan);font-weight:600">${b.n}</span> <span style="color:var(--text-dim)">(${b.role})</span><br><span style="font-size:10px;color:var(--text-dim)">→ ${others}</span></div>`});h+=`</div>`}
    const acts=ACTORS.filter(a=>a.d===nd.id).sort((a,b)=>b.c-a.c);
    if(acts.length){h+=`<div class="ds"><h4>Frequent Collaborators</h4>`;acts.forEach(a=>{h+=`<div class="strow"><span class="sk" style="color:var(--orange)">${a.n}</span><span class="svl">${a.c} film</span></div>`});h+=`</div>`}
    const studs=STUDIOS.filter(s=>s.dirs.includes(nd.id));
    if(studs.length){h+=`<div class="ds"><h4>Studios</h4>`;studs.forEach(s=>{h+=`<div class="strow"><span class="sk" style="color:var(--green)">${s.n}</span><span class="svl">${s.f} film</span></div>`});h+=`</div>`}
  } else if(nd.type==='movement'){
    const mb=MOV.filter(([p,m])=>m===nd.id).map(([p,m])=>p);
    h+=`<div class="ds"><h4>Members (${mb.length})</h4>`;mb.forEach(p=>{const d=D.find(x=>x.n===p);h+=`<div class="il">${p}${d?` <span style="color:var(--text-dim)">(${d.f} film)</span>`:''}</div>`});h+=`</div>`;
  } else if(nd.type==='bridge'){
    h+=`<div class="ds"><h4>Bridge Info</h4><div class="dtg" style="background:rgba(78,205,196,.1);color:var(--cyan)">${nd.role}</div></div>`;
    h+=`<div class="ds"><h4>Connected Directors</h4>`;(nd.bdirs||[]).forEach(d=>{h+=`<div class="il"><span class="ia">⟷</span> ${d}</div>`});h+=`</div>`;
  } else if(nd.type==='external'){
    const io=INF.filter(([f,t])=>t===nd.id).map(([f,t])=>f);
    h+=`<div class="ds"><h4>External Influence</h4><div class="dtg" style="background:rgba(91,141,239,.1);color:var(--blue)">Director/Writer</div></div>`;
    if(io.length){h+=`<div class="ds"><h4>Influenced</h4>`;io.forEach(f=>{h+=`<div class="il"><span class="ia">→</span> ${f}</div>`});h+=`</div>`}
  } else if(nd.type==='film'){
    h+=`<div class="ds"><h4>Film Info</h4>`;
    h+=`<div class="strow"><span class="sk">Director</span><span class="svl" style="color:var(--gold)">${nd.dirName}</span></div>`;
    h+=`<div class="strow"><span class="sk">Year</span><span class="svl">${nd.year}</span></div>`;
    h+=`<div class="strow"><span class="sk">Rating</span><span class="svl" style="color:var(--gold)">★ ${nd.rating?.toFixed(1)||'?'}</span></div></div>`;
  } else if(nd.type==='actor'){
    h+=`<div class="ds"><h4>Actor Info</h4>`;
    h+=`<div class="strow"><span class="sk">Director</span><span class="svl" style="color:var(--gold)">${nd.dirName}</span></div>`;
    h+=`<div class="strow"><span class="sk">Films together</span><span class="svl">${nd.actCount}</span></div></div>`;
  } else if(nd.type==='studio'){
    h+=`<div class="ds"><h4>Studio Info</h4>`;
    h+=`<div class="strow"><span class="sk">Film count</span><span class="svl" style="color:var(--green)">${nd.studioFilms}</span></div></div>`;
    if(nd.studioDirs){h+=`<div class="ds"><h4>Directors</h4>`;nd.studioDirs.forEach(d=>{h+=`<div class="il"><span class="ia">⟷</span> ${d}</div>`});h+=`</div>`}
  }
  db.innerHTML=h;dp.classList.add('vis');
}
function cD(){document.getElementById('dp').classList.remove('vis')}

// ═══════════ CONTROLS ═══════════
const layers={directors:true,influences:true,movements:true,bridges:false,external:false,films:false,actors:false,studios:false};
function tL(el){const l=el.dataset.l;layers[l]=!layers[l];el.classList.toggle('act');uV()}
function uV(){
  const q=document.getElementById('sI').value.toLowerCase().trim();
  nodes.forEach(n=>{
    if(n.type==='director')n.visible=layers.directors;
    else if(n.type==='movement')n.visible=layers.movements;
    else if(n.type==='external')n.visible=layers.external;
    else if(n.type==='bridge')n.visible=layers.bridges;
    else if(n.type==='film')n.visible=layers.films;
    else if(n.type==='actor')n.visible=layers.actors;
    else if(n.type==='studio')n.visible=layers.studios;
    if(q&&n.visible){n.visible=n.label.toLowerCase().includes(q);
      if(!n.visible){const con=edges.some(e=>(e.source.label.toLowerCase().includes(q)&&e.target.id===n.id)||(e.target.label.toLowerCase().includes(q)&&e.source.id===n.id));if(con)n.visible=true}}
    if(mode==='timeline'&&n.type==='director'&&n.y1>timeYear)n.visible=false;
  });
  edges.forEach(e=>{if(e.type==='influence')e.visible=layers.influences;else if(e.type==='movement')e.visible=layers.movements;else if(e.type==='bridge')e.visible=layers.bridges;else if(e.type==='film')e.visible=layers.films;else if(e.type==='actor')e.visible=layers.actors;else if(e.type==='studio')e.visible=layers.studios});
}
document.getElementById('sI').addEventListener('input',uV);
document.getElementById('fS').addEventListener('input',e=>{fMul=e.target.value/100;document.getElementById('fV').textContent=e.target.value});
document.getElementById('dS').addEventListener('input',e=>{lDist=+e.target.value;document.getElementById('dV').textContent=e.target.value});
function resetV(){zoom=1;panX=0;panY=0;selected=null;cD();cP();shufflePos()}
function tP(){paused=!paused;const b=document.getElementById('pB');b.classList.toggle('act');b.textContent=paused?'Resume':'Pause'}

// ═══════════ MODES ═══════════
function setMode(m){
  mode=m;document.querySelectorAll('.mt').forEach(t=>t.classList.remove('act'));
  document.querySelector(`.mt[onclick="setMode('${m}')"]`)?.classList.add('act');
  document.getElementById('tB').classList.toggle('vis',m==='timeline');
  if(m==='path'){pathSrc=null;cP();alert('Click the first director, then click the second → shortest path will be shown')}
  if(m!=='timeline'&&timeInt){clearInterval(timeInt);timePlaying=false}
  uV();
}

// ═══════════ TIMELINE ═══════════
document.getElementById('tS').addEventListener('input',e=>{timeYear=+e.target.value;document.getElementById('tY').textContent=timeYear;uV()});
function tTP(){
  if(timePlaying){clearInterval(timeInt);timePlaying=false;document.getElementById('tPl').textContent='▶ Play';return}
  timePlaying=true;document.getElementById('tPl').textContent='⏸ Pause';
  const sl=document.getElementById('tS');
  timeYear=1925;sl.value=1925;document.getElementById('tY').textContent=1925;uV();
  timeInt=setInterval(()=>{timeYear++;if(timeYear>2025){clearInterval(timeInt);timePlaying=false;document.getElementById('tPl').textContent='▶ Play';return}
  sl.value=timeYear;document.getElementById('tY').textContent=timeYear;uV()},120);
}

// ═══════════ LEGEND ═══════════
document.getElementById('lgd').innerHTML=[
  {c:C.director,l:'Director'},{c:C.film,l:'Film'},{c:C.actor,l:'Actor'},{c:C.studio,l:'Studio'},
  {c:C.movement,l:'Movement'},{c:C.bridge,l:'Bridge'},{c:C.external,l:'External Influence'},
  {c:'#f06830',l:'Influence →'}
].map(i=>`<div class="lgd-i"><span class="lgd-d" style="background:${i.c}"></span>${i.l}</div>`).join('');

// ═══════════ MAIN ═══════════
build();uV();
(function loop(){sim();draw();requestAnimationFrame(loop)})();
</script>
